# Dedicated Qdrant app — runs the upstream qdrant/qdrant image with a persistent
# volume, private-only (reached by the bot over Flycast at <your-qdrant-app>.flycast:6333).
app = "<your-qdrant-app>"
primary_region = "iad"

[build]
  image = "qdrant/qdrant:latest"

[mounts]
  source = "qdrant_data"
  destination = "/qdrant/storage"

[[services]]
  internal_port = 6333
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # Raw TCP on 6333 over Flycast (private only — no public handlers).
  [[services.ports]]
    port = 6333

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
